    d.style.color='#f87171';
  }
};
dbg('Initializing Firebase...');
// Verify Firebase loaded

});
const db = firebase.firestore();

// Firebase functions (global, accessed by React code)
window.FB = {
  subEntries(cb) {
    return db.collection('entries').orderBy('date','desc').onSnapshot(snap => {
      const data = snap.docs.map(d => ({...d.data(), _docId: d.id}));
      data.sort((a,b) => (`${b.date}T${b.time}`).localeCompare(`${a.date}T${a.time}`));
      cb(data);
    });
  },
  async addEntry(e) { 
    // Remove undefined values (Firestore rejects them)
    const clean = Object.fromEntries(Object.entries(e).filter(([_,v]) => v !== undefined));
    await db.collection('entries').doc(e.id).set(clean); 
  },
  async delEntry(id) { await db.collection('entries').doc(id).delete(); },
  subProfile(cb) { return db.collection('config').doc('profile').onSnapshot(s => cb(s.exists ? s.data() : null)); },
  async saveProfile(p) { await db.collection('config').doc('profile').set(p); },
  subMeds(cb) { return db.collection('config').doc('meds').onSnapshot(s => cb(s.exists ? s.data()?.list : null)); },
  async saveMeds(m) { await db.collection('config').doc('meds').set({list:m}); },
  subTimer(cb) { return db.collection('config').doc('active').onSnapshot(s => cb(s.exists ? s.data() : null)); },
  async saveTimer(t) { await db.collection('config').doc('active').set(t||{cleared:true}); },
  subInbox(cb) { return db.collection('config').doc('inbox').onSnapshot(s => cb(s.exists ? s.data() : null)); },
  async saveInbox(data) { await db.collection('config').doc('inbox').set(data); },
  // Push notification token storage — each token is a separate doc in subcollection
  // Path: config/pushTokens/tokens/{tokenId}
  // Worker reads from this path to fan out push notifications.
  async savePushToken(token, lang) {
    if (!token) return;
    // Use a hash of the token as document ID to keep paths short and dedupe across devices
    const docId = btoa(token).replace(/[+/=]/g, '').slice(0, 40);
    await db.collection('config').doc('pushTokens').collection('tokens').doc(docId).set({
      token: token,
      lang: lang || 'en',
      updatedAt: new Date().toISOString()
    });
  },
  // Reminders: medication reminders that fire push notifications at scheduled times.
  // Path: config/reminders/items/{reminderId}
  // Worker checks this collection every minute and fires FCM if horario matches.
  subReminders(cb) {
    return db.collection('config').doc('reminders').collection('items').onSnapshot(snap => {
      const list = snap.docs.map(d => ({...d.data(), _id: d.id}));
      cb(list);
    });
  },
  async addReminder(reminder) {
    const id = reminder._id || ('rem_' + Date.now() + '_' + Math.random().toString(36).slice(2,7));
    const clean = {...reminder};
    delete clean._id;
    await db.collection('config').doc('reminders').collection('items').doc(id).set(clean);
    return id;
  },
  async delReminder(id) {
    await db.collection('config').doc('reminders').collection('items').doc(id).delete();
  },
};
dbg('Firebase ready');
} catch(e) { dbg('Firebase Error: '+e.message); throw e; }
</script>

  for(const baseId in baseGroups){

    const p1=pair.find(e=>!e.id.endsWith("_b"));

function getTodayCuriosity(age,lang){
  if(!age) return null;
  const dayNum=age.totalDays;
  const monthNum=age.months;
  const weekNum=age.totalWeeks;
  let txt=null,tagLabel="";
  // Priority 1: daily curiosities (days 1-30)
  if(dayNum>=1&&dayNum<=30){
    const c=CURIOSITIES&&CURIOSITIES[dayNum-1];
    if(c){
      txt=lang==="en"?c.en:c.pt;
      tagLabel=lang==="en"?`Day ${dayNum}`:`Dia ${dayNum}`;
    }
  }
  // Priority 2: monthly milestones (only on the exact day of the month anniversary)
  else if(monthNum>=2&&monthNum<=12&&age.days===0){
    const ms=MILESTONES&&MILESTONES.find(m=>m.m===monthNum);
    if(ms){
      txt=lang==="en"?ms.en:ms.pt;
      tagLabel=lang==="en"?`${monthNum} months`:`${monthNum} meses`;
    }
  }
  // Priority 3: weekly curiosities (weeks 5-52)
  if(!txt&&weekNum>=5&&weekNum<=52){
    const idx=weekNum-5;
    const wc=WEEKLY_CURIOSITIES&&WEEKLY_CURIOSITIES[idx];

// Split sleep entry that crosses midnight into two entries
function splitMidnight(entry){
  if(!entry.durationMin || (entry.type!=="sleep"&&entry.type!=="nap")) return [entry];
  const [h,m]=(entry.time||"00:00").split(":").map(Number);
  const startMin=h*60+m;
  const endMin=startMin+entry.durationMin;
  if(endMin<=1440) return [entry]; // doesn't cross midnight
  const beforeMidnight=1440-startMin;
  const afterMidnight=entry.durationMin-beforeMidnight;
  const nextDay=dateOffset(entry.date,1);
  // Split wakings: each waking belongs to ONE half based on its actual time.
  // A waking is "before midnight" if its time-of-day is >= startMin (still on the start day).
  // A waking is "after midnight" if its time-of-day is < startMin (rolled over to next day).
  const wakings=entry.wakings||[];
  const wakingsBefore=[];
  const wakingsAfter=[];
  for(const w of wakings){
    const [wh,wm]=(w.time||"00:00").split(":").map(Number);
    const wMin=wh*60+wm;
    // If the waking time is greater or equal to start time, it's still on the start day
    // (e.g., bedtime 20:42, waking 23:30 → before midnight)
    // Otherwise it rolled over (e.g., bedtime 20:42, waking 04:28 → after midnight)
    if(wMin>=startMin) wakingsBefore.push(w);
    else wakingsAfter.push(w);
  }
  const part1={...entry, durationMin:beforeMidnight, id:entry.id};
  const part2={...entry, date:nextDay, time:"00:00", durationMin:afterMidnight, id:entry.id+"_b"};
  // Only attach wakings array if non-empty (keeps entries clean for old code paths)
  if(wakingsBefore.length>0) part1.wakings=wakingsBefore; else delete part1.wakings;
  if(wakingsAfter.length>0) part2.wakings=wakingsAfter; else delete part2.wakings;
  return [part1, part2];
}

function Ring({activeTimer,napSug,tick,recentEvents,lang,showOrbit,screenLockActive}){
  const[tip,setTip]=useState(null);
  useEffect(()=>{if(tip!==null){const t=setTimeout(()=>setTip(null),3000);return()=>clearTimeout(t)}},[tip]);
  const sz=340,cx=sz/2,cy=sz/2,R=148;
  const gapDeg=55,startAng=90+gapDeg/2,totalArc=360-gapDeg;
  const dotSz=46,sleepSz=44;
  let lbl="",sub="",col1=T.dim,col2=T.dim,isBedtime=false;
  if(activeTimer){
    const el=Math.max(0,Math.floor((Date.now()-new Date(activeTimer.startTime).getTime())/1000));const mins=Math.floor(el/60);
    lbl=mins<60?`${mins} min`:`${Math.floor(mins/60)}h ${String(mins%60).padStart(2,"0")}m`;
    if(activeTimer.type==="nursing"){sub=lang==="en"?"Nursing":"Amamentando";col1="#2563eb";col2="#60a5fa"}
    else if(activeTimer.type==="nap"){sub=lang==="en"?"Napping":"Soneca";col1="#7c3aed";col2="#c084fc"}
    else if(activeTimer.type==="tummytime"){sub=lang==="en"?"Tummy time":"Tummy time";col1="#d97706";col2="#fbbf24"}
    else{sub=lang==="en"?"Bedtime":"Boa noite";col1="#7c3aed";col2="#c084fc";isBedtime=true}
  } else if(napSug){
    lbl=fmtDur(napSug.el);sub=lang==="en"?"Awake for":"Acordado(a)";
    if(napSug.state==="overdue"){col1="#dc2626";col2="#f87171"}
    else if(napSug.state==="stretching"){col1="#ea580c";col2="#fb923c"}
    else if(napSug.state==="sweet"){col1="#059669";col2="#34d399"}
    else if(napSug.state==="opening"){col1="#d97706";col2="#fbbf24"}
    else{col1="#059669";col2="#34d399"}
  } else{sub="";lbl="\u2014"}
  const hasProgress=col1!==T.dim;
  const toMin=t=>{const[h,m]=(t||"12:00").split(":").map(Number);return h*60+m};
  const evs=(recentEvents||[]);
  // Day window: from wake-up to midnight
  let wakeMin=6*60;let hasWakeup=false;
  const wakeEv=evs.find(e=>e.type==="wakeup");
  if(wakeEv){wakeMin=toMin(wakeEv.time);hasWakeup=true}
  else{const ls=evs.filter(e=>(e.type==="sleep"||e.type==="nap")&&e.durationMin>0).sort((a,b)=>(b.date+"T"+b.time).localeCompare(a.date+"T"+a.time))[0];if(ls){const em=toMin(ls.time)+ls.durationMin;if(em>=5*60&&em<=12*60){wakeMin=em;hasWakeup=true}}
  else{const firstEv=[...evs].sort((a,b)=>a.time.localeCompare(b.time))[0];if(firstEv)wakeMin=Math.max(0,toMin(firstEv.time)-15)}}
  const dayStart=wakeMin;
  let dayEnd=24*60;
  let bedMin=null;
  const bedEv=[...evs].filter(e=>e.type==="sleep").sort((a,b)=>`${a.date}T${a.time}`.localeCompare(`${b.date}T${b.time}`))[0];
  if(bedEv){let bm=toMin(bedEv.time);if(bm<dayStart)bm+=1440;bedMin=bm;if(bm>dayStart)dayEnd=bm}
  if(!bedMin&&activeTimer&&activeTimer.type==="sleep"){const st=new Date(activeTimer.startTime);const bm=st.getHours()*60+st.getMinutes();const adjBm=bm<dayStart?bm+1440:bm;bedMin=adjBm;if(adjBm>dayStart)dayEnd=adjBm}
  const daySpan=Math.max(1,dayEnd-dayStart);
  const toAng=mins=>{const t=Math.max(0,Math.min(1,(mins-dayStart)/daySpan));return startAng+t*totalArc};
  const descArc=(sA,eA)=>{const s=sA*Math.PI/180,e=eA*Math.PI/180;return`M ${cx+R*Math.cos(s)} ${cy+R*Math.sin(s)} A ${R} ${R} 0 ${eA-sA>180?1:0} 1 ${cx+R*Math.cos(e)} ${cy+R*Math.sin(e)}`};
  const sleepEvs=evs.filter(e=>e.type==="nap"&&e.durationMin>0);
  const dotEvs=evs.filter(e=>e.type==="bottle"||e.type==="nursing"||e.type==="diaper"||e.type==="medicine"||e.type==="tummytime");
  const sleepArcs=sleepEvs.map(ev=>{
    const mins=toMin(ev.time),dur=ev.durationMin;
    if(mins+dur<dayStart||mins>dayStart+daySpan)return null;
    const a1=toAng(Math.max(mins,dayStart)),a2=toAng(Math.min(mins+dur,dayStart+daySpan));
    const midAng=(a1+a2)/2;const midRad=midAng*Math.PI/180;
    return{ev,path:descArc(a1,a2),mx:cx+R*Math.cos(midRad),my:cy+R*Math.sin(midRad),col:TYPES[ev.type]?.color||T.purple};
  }).filter(Boolean);
  const MIN_GAP=22;
  const rawDots=dotEvs.map(ev=>{
    const cfg=TYPES[ev.type];if(!cfg)return null;
    const mins=toMin(ev.time);
    if(mins<dayStart||mins>dayStart+daySpan)return null;
    const angDeg=toAng(mins);const angRad=angDeg*Math.PI/180;
    return{ev,cfg,angDeg,x:cx+R*Math.cos(angRad),y:cy+R*Math.sin(angRad)};
  }).filter(Boolean);
  const groups=[];
  rawDots.forEach(d=>{const g=groups.find(gr=>Math.abs(gr[0].angDeg-d.angDeg)<MIN_GAP);if(g)g.push(d);else groups.push([d])});
  const dots=groups.map(gr=>({primary:gr[0],items:gr}));
  // Determine last event globally: dot vs sleep arc (compare end times)
  const _lastEv=(()=>{let maxT="",type="none",dIdx=-1,sIdx=-1;dots.forEach((gr,idx)=>{gr.items.forEach(it=>{const t=`${it.ev.date}T${it.ev.time}`;if(t>maxT){maxT=t;type="dot";dIdx=idx}})});sleepArcs.forEach((sa,idx)=>{const endMs=new Date(`${sa.ev.date}T${sa.ev.time}`).getTime()+sa.ev.durationMin*60000;const d=new Date(endMs);const t=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+"T"+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");if(t>maxT){maxT=t;type="sleep";sIdx=idx}});return{type,dIdx,sIdx}})();
  const lastDotIdx=_lastEv.type==="dot"?_lastEv.dIdx:-1;
  const lastSleepArcIdx=_lastEv.type==="sleep"?_lastEv.sIdx:-1;
  const totalSleepMin=evs.filter(e=>(e.type==="sleep"||e.type==="nap")&&e.durationMin).reduce((s,e)=>s+e.durationMin,0);

  // Anchor: sun at wake-up (ring start), moon at bedtime (ring end)
  const wakeTimeStr=`${String(Math.floor(wakeMin/60)).padStart(2,"0")}:${String(wakeMin%60).padStart(2,"0")}`;
  const sunAng=toAng(wakeMin);const sunRad=sunAng*Math.PI/180;
  const anchorSun=hasWakeup?{x:cx+R*Math.cos(sunRad),y:cy+R*Math.sin(sunRad),time:wakeTimeStr}:null;
  let anchorMoon=null;
  if(bedMin){const dispMin=bedMin%1440;const bedTimeStr=`${String(Math.floor(dispMin/60)).padStart(2,"0")}:${String(dispMin%60).padStart(2,"0")}`;const moonAng=toAng(bedMin);const moonRad=moonAng*Math.PI/180;anchorMoon={x:cx+R*Math.cos(moonRad),y:cy+R*Math.sin(moonRad),time:bedTimeStr}}

  // Live timer arc (nap + tummytime, during daytime)
  let timerArc=null;
  if(activeTimer&&(activeTimer.type==="nap"||activeTimer.type==="tummytime")){
    const st=new Date(activeTimer.startTime);
    const startMins=st.getHours()*60+st.getMinutes();
    const now=new Date();
    const nowMins=now.getHours()*60+now.getMinutes();
    if(startMins>=dayStart){
      const a1=toAng(startMins),a2=toAng(Math.min(nowMins,dayStart+daySpan-1));
      if(a2>a1){const midAng=(a1+a2)/2;const midRad=midAng*Math.PI/180;const tipRad=a2*Math.PI/180;timerArc={path:descArc(a1,a2),col:activeTimer.type==="tummytime"?T.amber:T.purple,mx:cx+R*Math.cos(midRad),my:cy+R*Math.sin(midRad),tipX:cx+R*Math.cos(tipRad),tipY:cy+R*Math.sin(tipRad)}}
    }
  }

  return(<div style={{position:"relative",width:sz,margin:"0 auto"}}>
    <div style={{position:"relative",width:sz,height:sz}}>
      <svg width={sz} height={sz} style={{overflow:"visible"}}>
        <defs><filter id="slpG"><feGaussianBlur stdDeviation="8" result="b"/><feFlood floodColor={T.purple} floodOpacity="0.35" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
        <path d={descArc(startAng,startAng+totalArc)} fill="none" stroke="rgba(40,55,120,0.18)" strokeWidth={20} strokeLinecap="round"/>

}

function EditStartModal({open,onClose,activeTimer,onSave}){
  const [dateStr,setDateStr]=useState("");
  const [timeStr,setTimeStr]=useState("");
  const [tick,setTick]=useState(0);
  // Init fields when opening
  useEffect(()=>{
    if(!open||!activeTimer)return;
    const st=new Date(activeTimer.startTime);
    setDateStr(`${st.getFullYear()}-${String(st.getMonth()+1).padStart(2,"0")}-${String(st.getDate()).padStart(2,"0")}`);
    setTimeStr(`${String(st.getHours()).padStart(2,"0")}:${String(st.getMinutes()).padStart(2,"0")}`);
  },[open,activeTimer]);
  // Live tick to keep "new duration" fresh
  useEffect(()=>{
    if(!open)return;
    const iv=setInterval(()=>setTick(k=>k+1),1000);
    return()=>clearInterval(iv);
  },[open]);
  if(!activeTimer)return null;
  const typeLabel=activeTimer.type==="sleep"?(_lang==="en"?"Bedtime":"Bedtime"):activeTimer.type==="nap"?(_lang==="en"?"Nap":"Soneca"):(_lang==="en"?"Tummy time":"Tummy time");
  const typeColor=activeTimer.type==="tummytime"?T.amber:T.purple;
  const typeColorLight=activeTimer.type==="tummytime"?"#fde68a":"#c4b5fd";
  const typeIcon=activeTimer.type==="sleep"?"moon":activeTimer.type==="nap"?"cloud":"baby";
  // Parse proposed new start
  let newStartMs=null,valid=false,errMsg="";
  try{
    if(dateStr&&timeStr){
      const d=new Date(`${dateStr}T${timeStr}`);
      if(!isNaN(d.getTime())){
        newStartMs=d.getTime();
        const nowMs=Date.now();
        if(newStartMs>nowMs){
          errMsg=_lang==="en"?"Start cannot be in the future":"Início não pode ser no futuro";
        }else if(nowMs-newStartMs>30*60*60*1000){
          errMsg=_lang==="en"?"Too far in the past (max 30h)":"Muito longe no passado (máx 30h)";
        }else{
          // If wakings exist, new start can't be after the first waking
          const wakings=activeTimer.wakings||[];
          if(wakings.length>0){
            const origStart=new Date(activeTimer.startTime);
            // Compute first waking absolute timestamp
            const fw=wakings[0];
            const[fwh,fwm]=(fw.time||"00:00").split(":").map(Number);
            const startMinOfDay=origStart.getHours()*60+origStart.getMinutes();
            const wakeMinOfDay=fwh*60+fwm;
            let dayOffset=0;
            if(wakeMinOfDay<startMinOfDay)dayOffset=1;
            const fwMs=new Date(origStart.getFullYear(),origStart.getMonth(),origStart.getDate()+dayOffset,fwh,fwm).getTime();
            if(newStartMs>=fwMs){
              errMsg=_lang==="en"?"First waking is before this time":"Primeiro despertar é antes desse horário";
            }else{valid=true}
          }else{valid=true}
        }
      }
    }
  }catch(e){errMsg=_lang==="en"?"Invalid date/time":"Data/hora inválidos"}
  // Current duration and new duration
  const newMins=newStartMs?Math.max(0,Math.floor((Date.now()-newStartMs)/60000)):0;
  const oldMins=Math.max(0,Math.floor((Date.now()-new Date(activeTimer.startTime).getTime())/60000));
  const fmtM=m=>{const h=Math.floor(m/60),r=m%60;return h>0?`${h}h ${r}min`:`${r}min`};
  const doSave=async()=>{
    if(!valid||!newStartMs)return;
    Haptic.medium();
    await onSave(new Date(newStartMs).toISOString());
    onClose();
  };
  const wakingsCount=(activeTimer.wakings||[]).length;
  return(<Modal open={open} onClose={onClose}>
    <div style={{width:64,height:64,margin:"0 auto 16px",borderRadius:20,background:`linear-gradient(135deg,${typeColor}38,${typeColor}10)`,border:`1px solid ${typeColor}50`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 0 0 rgba(255,255,255,0.08) inset",position:"relative"}}><Icon name={typeIcon} size={28} color={typeColorLight}/></div>
    <div style={{textAlign:"center",fontSize:22,fontWeight:800,letterSpacing:-0.5,color:"#f0f2ff",marginBottom:6}}>{_lang==="en"?"Edit start":"Editar início"}</div>
    <div style={{textAlign:"center",fontSize:12,color:"#9099c3",lineHeight:1.55,marginBottom:20}}>{_lang==="en"?`Change the start time of this ${typeLabel.toLowerCase()}. Wakings stay at their actual time.`:`Mude o horário de início deste ${typeLabel.toLowerCase()}. Despertares permanecem no horário real.`}</div>
    <div style={{fontSize:11,color:"#7a80a8",fontWeight:600,marginBottom:10,letterSpacing:-0.05}}>{_lang==="en"?"Day":"Data"}</div>
    <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) minmax(0,1fr)",gap:10,marginBottom:16}}>
      <input type="date" value={dateStr} onChange={e=>setDateStr(e.target.value)} style={{width:"100%",maxWidth:"100%",boxSizing:"border-box",WebkitAppearance:"none",appearance:"none",padding:"14px 14px",background:"rgba(20,26,60,0.55)",border:`1px solid ${T.gBSoft}`,borderRadius:14,color:T.text,fontSize:16,fontWeight:600,letterSpacing:-0.2,outline:"none",colorScheme:"dark",textAlign:"center",boxShadow:T.insetTop}}/>
      <input type="time" value={timeStr} onChange={e=>setTimeStr(e.target.value)} style={{width:"100%",maxWidth:"100%",boxSizing:"border-box",WebkitAppearance:"none",appearance:"none",padding:"14px 14px",background:"rgba(20,26,60,0.55)",border:`1px solid ${T.gBSoft}`,borderRadius:14,color:T.text,fontSize:16,fontWeight:600,letterSpacing:-0.2,outline:"none",colorScheme:"dark",textAlign:"center",fontVariantNumeric:"tabular-nums",boxShadow:T.insetTop}}/>
    </div>
    {errMsg?(
      <div style={{padding:"12px 14px",borderRadius:12,background:"rgba(248,113,113,0.10)",border:"1px solid rgba(248,113,113,0.28)",marginBottom:16,fontSize:12,color:"#fca5a5",textAlign:"center",lineHeight:1.5}}>{errMsg}</div>
    ):valid&&(
      <div style={{padding:"12px 14px",borderRadius:12,background:`${typeColor}10`,border:`1px solid ${typeColor}28`,marginBottom:16,fontSize:12,color:typeColorLight,textAlign:"center",lineHeight:1.6}}>
        {_lang==="en"?"New duration: ":"Nova duração: "}<strong style={{color:"#f0f2ff",fontWeight:800}}>{fmtM(newMins)}</strong>
        <span style={{color:"#7a80a8",fontWeight:500}}> ({_lang==="en"?"was ":"era "}{fmtM(oldMins)})</span>
        {wakingsCount>0&&<div style={{fontSize:10,color:"#9099c3",marginTop:4}}>{wakingsCount} {_lang==="en"?`waking${wakingsCount>1?"s":""} preserved`:`despertar${wakingsCount>1?"es":""} preservado${wakingsCount>1?"s":""}`}</div>}
      </div>
    )}
    <button onClick={doSave} disabled={!valid} style={{width:"100%",padding:16,borderRadius:16,background:valid?`linear-gradient(180deg,${typeColor},${typeColor}cc)`:"rgba(14,18,48,0.6)",color:valid?"#1a0f00":T.dim,fontSize:16,fontWeight:800,letterSpacing:-0.2,border:`1px solid ${valid?`${typeColor}70`:T.gBSoft}`,boxShadow:valid?`0 1px 0 0 rgba(255,255,255,0.25) inset, 0 0 0 1px rgba(255,255,255,0.06), 0 8px 24px -8px ${typeColor}55`:"none",cursor:valid?"pointer":"not-allowed",opacity:valid?1:0.5}}>{_lang==="en"?"Save changes":"Salvar alterações"}</button>
  </Modal>);

function CuriosityCard({age,lang,tick}){
  const[vis,setVis]=useState(false);const[fading,setFading]=useState(false);const shownRef=useRef(null);

    if(!age)return;

    if(shownRef.current===key)return;
    shownRef.current=key;setVis(true);setFading(false);
  },[age,tick]);
  useEffect(()=>{
    if(!vis)return;
    const t1=setTimeout(()=>setFading(true),13500);
    const t2=setTimeout(()=>setVis(false),15000);
    return()=>{clearTimeout(t1);clearTimeout(t2)};

  let txt=null,col=colors[0],tagLabel="",daysLeft=null;
  // Priority 1: daily curiosities (days 1-30)
  if(dayNum>=1&&dayNum<=30){

  }

  else if(monthNum>=2&&monthNum<=12&&age.days===0){
    const ms=MILESTONES.find(m=>m.m===monthNum);
    if(ms){
      txt=lang==="en"?ms.en:ms.pt;col=colors[(monthNum-1)%colors.length];
      tagLabel=lang==="en"?`${monthNum} months`:`${monthNum} meses`;
    }

  if(!txt&&weekNum>=5&&weekNum<=52){

    if(wc){
      txt=lang==="en"?wc.en:wc.pt;col=colors[(weekNum-1)%colors.length];

        <svg width="16" height="16" viewBox="0 0 24 24" fill={`${col}50`} stroke={col} strokeWidth="1.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="1" y1="12" x2="3" y2="12"/></svg>
      </div>

function Sheet({open,onClose,children}){
  const[vis,setVis]=useState(false),[show,setShow]=useState(false);
  const sheetRef=useRef(null);
  const dragRef=useRef({active:false,startY:0,lastY:0,lastT:0,velocity:0});
  const[dragY,setDragY]=useState(0);
  const[isDragging,setIsDragging]=useState(false);
  useEffect(()=>{
    if(open){setVis(true);setDragY(0);setIsDragging(false);requestAnimationFrame(()=>requestAnimationFrame(()=>setShow(true)))}
    else{setShow(false);const t=setTimeout(()=>{setVis(false);setDragY(0)},350);return()=>clearTimeout(t)}
  },[open]);
  const onPtrDown=(e)=>{
    if(sheetRef.current&&sheetRef.current.scrollTop>0)return;
    dragRef.current={active:true,startY:e.clientY,lastY:e.clientY,lastT:performance.now(),velocity:0};
    setIsDragging(true);

  };
  const onPtrMove=(e)=>{
    if(!dragRef.current.active)return;
    const now=performance.now();
    const dt=now-dragRef.current.lastT;
    const dy=e.clientY-dragRef.current.lastY;
    if(dt>0)dragRef.current.velocity=dy/dt;
    dragRef.current.lastY=e.clientY;
    dragRef.current.lastT=now;
    let diff=e.clientY-dragRef.current.startY;
    if(diff<0)diff=Math.max(-20,diff/4);
    setDragY(diff);
  };
  const onPtrUp=()=>{
    if(!dragRef.current.active)return;
    const distance=dragY;
    const velocity=dragRef.current.velocity;
    dragRef.current.active=false;
    const h=sheetRef.current?.offsetHeight||500;
    setIsDragging(false);
    if(distance>h*0.28||velocity>0.55){Haptic.light();onClose()}

  };
  if(!vis)return null;
  const sheetTransform=show?(dragY>0?`translateY(${dragY}px)`:"translateY(0)"):"translateY(100%)";
  const sheetTransition=isDragging?"none":"transform .38s cubic-bezier(0.22,1,0.36,1)";
  const sheetH=sheetRef.current?.offsetHeight||500;
  const backdropOpacity=show?Math.max(0,1-dragY/(sheetH*0.95)):0;
  const backdropTransition=isDragging?"none":"opacity .35s";

        {unreadCount>0?`${unreadCount} ${lang==="en"?"new":"novas"}`:(lang==="en"?"All read":"Todas lidas")}
      </span>
      {unreadCount>0&&<button onClick={onMarkAllRead} style={{marginLeft:"auto",fontSize:11,color:T.sub,padding:"7px 14px",borderRadius:11,background:"rgba(22,28,60,0.6)",border:`1px solid ${T.gBSoft}`,fontWeight:600,letterSpacing:-0.05,boxShadow:T.insetTop}}>{lang==="en"?"Mark all read":"Marcar todas"}</button>}
    </div>}

    {/* List or empty state */}
    <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
      {items.length===0?(
        <div style={{textAlign:"center",padding:"80px 24px 40px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <div style={{width:72,height:72,margin:"0 auto 18px",borderRadius:22,background:"rgba(139,124,246,0.06)",border:"1px solid rgba(139,124,246,0.12)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Icon name="bell" size={32} color={T.dim}/>
          </div>
          <div style={{fontSize:15,fontWeight:800,marginBottom:6,color:T.text}}>{lang==="en"?"All caught up":"Tudo em dia"}</div>
          <div style={{fontSize:11,color:T.sub,lineHeight:1.6,maxWidth:260}}>{lang==="en"?"New hints from the routine engine will appear here during the day.":"Novas dicas do engine aparecerão aqui durante o dia."}</div>
          <div style={{display:"inline-flex",alignItems:"center",gap:5,marginTop:14,padding:"5px 10px",borderRadius:8,background:"rgba(139,124,246,0.06)",fontSize:9,color:T.accent,fontWeight:700,letterSpacing:0.5}}>
            <Icon name="clock" size={10} color={T.accent}/>

          </div>
        </div>
      ):items.map(it=>{
        const col=colorByType[it.type]||T.blue;
        const ic=iconByType[it.type]||"star";
        const unread=!it.read;
        const isCuriosity=it.type==="curiosity";
        const colLight=it.type==="good"?"#6ee7b7":it.type==="warn"?"#fdba74":it.type==="curiosity"?"#c4b5fd":"#7dd3fc";
        return(<button key={it.key} onClick={()=>unread&&onMarkRead(it.key)} style={{position:"relative",display:"flex",alignItems:"flex-start",gap:13,padding:"16px 22px 16px 26px",margin:"0 18px 8px",borderRadius:18,background:unread?`linear-gradient(180deg,${col}1a,${col}05)`:"rgba(22,28,60,0.35)",border:`1px solid ${unread?col+"38":T.gBSoft}`,boxShadow:unread?`0 1px 0 0 rgba(255,255,255,0.06) inset, 0 6px 16px -8px ${col}25`:T.insetTop,overflow:"hidden",width:"calc(100% - 36px)",textAlign:"left",cursor:unread?"pointer":"default"}}>
          <div style={{position:"absolute",left:0,top:0,bottom:0,width:4,background:`linear-gradient(180deg,${col},${col}40)`,borderRadius:"0 2px 2px 0",pointerEvents:"none",opacity:unread?1:0.4}}/>
          <div style={{width:38,height:38,borderRadius:12,background:`linear-gradient(135deg,${col}40,${col}10)`,border:`1px solid ${col}50`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:unread?1:0.5,boxShadow:"0 1px 0 0 rgba(255,255,255,0.08) inset"}}>
            <Icon name={ic} size={17} color={colLight}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            {isCuriosity&&<div style={{fontSize:9,fontWeight:800,letterSpacing:0.8,textTransform:"uppercase",color:colLight,marginBottom:4,opacity:unread?1:0.5}}>{lang==="en"?"Daily curiosity":"Curiosidade do dia"}</div>}
            <div style={{fontSize:15,fontWeight:700,marginBottom:4,color:unread?colLight:T.sub,lineHeight:1.3,letterSpacing:-0.2}}>{it.title}</div>
            <div style={{fontSize:12,color:unread?"#9099c3":T.dim,lineHeight:1.55}}>{it.sub}</div>
            <div style={{fontSize:10,color:T.dim,marginTop:6,fontWeight:600,letterSpacing:0.3}}>{fmtAgo(it.timestamp)}</div>
          </div>
        </button>);
      })}
    </div>
  </div>);
}

function ProfilePage({profile,onSave,onBack,onGrowth,onShowChangelog,hasUnreadChangelog,reminders,onAddReminder,onDelReminder}){
  const[name,setName]=useState(profile.name||"");
  const[birth,setBirth]=useState(profile.birthDate||"");
  const[photo,setPhoto]=useState(profile.photo||"");
  const[mlGoal,setMlGoal]=useState(String(profile.mlGoal||""));
  const[birthWeight,setBirthWeight]=useState(String(profile.birthWeight||""));
  const[birthLength,setBirthLength]=useState(String(profile.birthLength||""));
  const[birthHead,setBirthHead]=useState(String(profile.birthHead||""));
  const[langSel,setLangSel]=useState(profile.lang||"en");
  const[keepScreenOn,setKeepScreenOn]=useState(profile.keepScreenOn!==false);
  const[hapticEnabled,setHapticEnabled]=useState(profile.hapticEnabled!==false);
  const[pushEnabled,setPushEnabled]=useState(profile.pushEnabled===true);
  const[pushPermission,setPushPermission]=useState(()=>typeof Notification!=="undefined"?Notification.permission:"unsupported");
  const[pushBusy,setPushBusy]=useState(false);
  // Local state for the new-reminder form
  const[remNome,setRemNome]=useState("");
  const[remDose,setRemDose]=useState("");
  const[remHorario,setRemHorario]=useState("09:00");
  const[remBusy,setRemBusy]=useState(false);
  // Feeding interval reminder state — single global reminder, not a list
  // Lookup the existing one from props.reminders (if any)
  const feedReminder=(reminders||[]).find(r=>r.tipo==="feedingInterval");
  // Medication reminders list (everything except the feeding interval one)
  const medList=(reminders||[]).filter(r=>r.tipo!=="feedingInterval");
  const[fdEnabled,setFdEnabled]=useState(feedReminder?.ativo===true);
  const[fdMinutes,setFdMinutes]=useState(feedReminder?.intervalMin||290);
  const[fdBusy,setFdBusy]=useState(false);
  // Human-readable conversion of fdMinutes (e.g. 290 → "4h 50min")
  const fdConverted=(()=>{const v=fdMinutes||0;const h=Math.floor(v/60);const m=v%60;if(h===0)return`${m}min`;if(m===0)return`${h}h`;return`${h}h ${m}min`})();
  // Sync local state when the prop changes (Firestore push from another device)
  useEffect(()=>{
    const r=(reminders||[]).find(x=>x.tipo==="feedingInterval");
    if(r){setFdEnabled(r.ativo===true);setFdMinutes(r.intervalMin||290)}
  },[reminders]);
  // Save handler — upserts the single feedingInterval reminder
  const saveFeedReminder=async(overrides={})=>{
    const enabled=overrides.ativo!==undefined?overrides.ativo:fdEnabled;
    const minutes=overrides.intervalMin!==undefined?overrides.intervalMin:fdMinutes;
    const existing=(reminders||[]).find(r=>r.tipo==="feedingInterval");
    setFdBusy(true);
    Haptic.medium();
    try{
      await onAddReminder({
        _id:existing?._id||"feedingInterval",
        tipo:"feedingInterval",
        ativo:enabled,
        intervalMin:minutes,
        createdAt:existing?.createdAt||new Date().toISOString()
      });
      Haptic.success();
    }catch(e){Haptic.warning()}
    setFdBusy(false);
  };
  const pushSupported=PushNotifs.isSupported();
  // Persists a single toggle change immediately to Firestore (no need to tap Save).
  // Builds the patch from current state values plus the override.
  const persistToggle=async(overrides)=>{
    const patch={
      name:name.trim(),
      birthDate:birth,
      photo,
      mlGoal:parseInt(mlGoal)||0,
      birthWeight:parseFloat(birthWeight)||0,
      birthLength:parseFloat(birthLength)||0,
      birthHead:parseFloat(birthHead)||0,
      lang:langSel,
      keepScreenOn,
      hapticEnabled,
      pushEnabled,
      ...overrides
    };
    try{await onSave(patch)}catch(e){/* fail silent */}
  };
  const handlePushToggle=async()=>{
    if(pushBusy)return;
    if(!pushSupported)return;
    if(pushEnabled){
      // Disable: flip the flag and persist immediately
      setPushEnabled(false);
      Haptic.light();
      await persistToggle({pushEnabled:false});
      return;
    }
    // Enable: must request permission via user gesture
    setPushBusy(true);
    Haptic.medium();
    try{
      const granted=await PushNotifs.requestPermission();
      setPushPermission(typeof Notification!=="undefined"?Notification.permission:"unsupported");
      if(granted){
        setPushEnabled(true);
        await persistToggle({pushEnabled:true});
        // Try to fetch token (may return null if FCM SDK not loaded — that's OK)
        const token=await PushNotifs.getToken();
        if(token)await PushNotifs.saveToken(token);
        Haptic.success();
      }else{
        Haptic.warning();
      }
    }catch(e){/* fail silent */}
    setPushBusy(false);
  };
  const fr=useRef(null);
  const handlePhoto=e=>{const f=e.target.files?.[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas"),mx=200;let w=img.width,h=img.height;if(w>h){h=(h/w)*mx;w=mx}else{w=(w/h)*mx;h=mx}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);setPhoto(c.toDataURL("image/jpeg",0.8))};img.src=ev.target.result};rd.readAsDataURL(f)};
  const doSave=()=>{onSave({name:name.trim(),birthDate:birth,photo,mlGoal:parseInt(mlGoal)||0,birthWeight:parseFloat(birthWeight)||0,birthLength:parseFloat(birthLength)||0,birthHead:parseFloat(birthHead)||0,lang:langSel,keepScreenOn,hapticEnabled,pushEnabled});onBack()};
  const inp={width:"100%",maxWidth:"100%",boxSizing:"border-box",WebkitAppearance:"none",appearance:"none",padding:"17px 18px",background:"rgba(20,26,60,0.55)",border:`1px solid ${T.gBSoft}`,borderRadius:16,color:T.text,fontSize:17,fontWeight:600,letterSpacing:-0.2,outline:"none",boxShadow:T.insetTop};
  return(<div style={{position:"fixed",inset:0,zIndex:200,maxWidth:480,margin:"0 auto",background:`radial-gradient(ellipse at 50% 0%,#10153d,${T.bg1} 65%)`,overflowY:"auto",overflowX:"hidden",overscrollBehavior:"contain",WebkitOverflowScrolling:"touch",paddingTop:"env(safe-area-inset-top)",paddingBottom:"calc(40px + env(safe-area-inset-bottom))"}}>
    <div style={{display:"flex",alignItems:"center",gap:14,padding:"16px 20px"}}><button onClick={onBack} style={{width:36,height:36,borderRadius:10,background:T.glass,border:`1px solid ${T.gB}`,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="back" size={18} color={T.sub}/></button><span style={{fontSize:17,fontWeight:700}}>{L("profile")}</span></div>
    <div style={{padding:"0 20px"}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:24}}><button onClick={()=>fr.current?.click()} style={{width:88,height:88,borderRadius:"50%",overflow:"hidden",background:T.glass,border:`2px solid ${T.accent}33`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>{photo?<img src={photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<Icon name="sun" size={32} color={T.sub}/>}</button><input ref={fr} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/><span style={{fontSize:11,color:T.dim,marginTop:8}}>{_lang==="en"?"Tap to change":"Toque para alterar"}</span></div>
      <div style={{background:"rgba(22,28,60,0.4)",borderRadius:16,border:`1px solid ${T.gB}`,padding:16,marginBottom:12}}>
        <Fld label={L("name")}><input type="text" placeholder={_lang==="en"?"e.g. Louise":"Ex: Louise"} value={name} onChange={e=>setName(e.target.value)} style={inp}/></Fld>
        <Fld label={L("birthDate")}><input type="date" value={birth} onChange={e=>setBirth(e.target.value)} style={{...inp,colorScheme:"dark",maxWidth:"100%",WebkitAppearance:"none",textAlign:"center"}}/></Fld>
        <Fld label={L("dailyMilkGoal")}><input type="number" inputMode="numeric" placeholder={_lang==="en"?"e.g. 600":"Ex: 600"} value={mlGoal} onChange={e=>setMlGoal(e.target.value)} style={inp}/></Fld>
      </div>
      <div style={{background:"rgba(22,28,60,0.4)",borderRadius:16,border:`1px solid ${T.gB}`,padding:16,marginBottom:12}}>
        <Fld label={langSel==="en"?"Language":"Idioma"}>
          <div style={{display:"flex",gap:4,background:"rgba(14,18,48,0.6)",borderRadius:10,padding:3,border:`1px solid ${T.gB}`}}>
            <button onClick={()=>setLangSel("en")} style={{flex:1,padding:"10px 0",borderRadius:8,fontSize:13,fontWeight:700,background:langSel==="en"?T.accent:"transparent",color:langSel==="en"?"#fff":T.sub}}>English</button>
            <button onClick={()=>setLangSel("pt")} style={{flex:1,padding:"10px 0",borderRadius:8,fontSize:13,fontWeight:700,background:langSel==="pt"?T.accent:"transparent",color:langSel==="pt"?"#fff":T.sub}}>Português</button>
          </div>
        </Fld>
      </div>
      <div style={{background:"linear-gradient(180deg,rgba(22,28,60,0.55),rgba(20,26,60,0.4))",borderRadius:18,border:`1px solid ${T.gBSoft}`,padding:18,marginBottom:14,boxShadow:T.insetTop}}>
        {/* Wake Lock toggle */}
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:14}}>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:4,color:"#f0f2ff",letterSpacing:-0.2}}>{langSel==="en"?"Keep screen on":"Manter tela ligada"}</div>
            <div style={{fontSize:12,color:"#7a80a8",lineHeight:1.5}}>{langSel==="en"?"During night wake & nursing timers":"Durante night wake e amamentação"}</div>
          </div>
          <button onClick={()=>{const v=!keepScreenOn;setKeepScreenOn(v);persistToggle({keepScreenOn:v})}} style={{position:"relative",width:52,height:32,borderRadius:16,background:keepScreenOn?`linear-gradient(180deg,${T.accent},#6d5cd4)`:"rgba(14,18,48,0.8)",border:`1px solid ${keepScreenOn?"rgba(139,124,246,0.5)":T.gBSoft}`,transition:"all .2s",flexShrink:0,cursor:"pointer",padding:0,boxShadow:keepScreenOn?"0 1px 0 0 rgba(255,255,255,0.18) inset, 0 4px 12px -4px rgba(139,124,246,0.4)":T.insetTop}}>
            <div style={{position:"absolute",top:3,left:keepScreenOn?25:3,width:24,height:24,borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 2px 6px rgba(0,0,0,0.4)"}}/>
          </button>
        </div>
        {/* Separator */}
        <div style={{height:1,background:T.gBSoft,margin:"16px 0"}}/>
        {/* Haptic toggle */}
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:14}}>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:4,color:"#f0f2ff",letterSpacing:-0.2}}>{langSel==="en"?"Haptic feedback":"Vibração tátil"}</div>
            <div style={{fontSize:12,color:"#7a80a8",lineHeight:1.5}}>{langSel==="en"?"Subtle vibration when logging events":"Vibração sutil ao registrar eventos"}</div>
          </div>
          <button onClick={()=>{const v=!hapticEnabled;setHapticEnabled(v);if(v){Haptic.setEnabled(true);Haptic.medium()}else{Haptic.setEnabled(false)}persistToggle({hapticEnabled:v})}} style={{position:"relative",width:52,height:32,borderRadius:16,background:hapticEnabled?`linear-gradient(180deg,${T.accent},#6d5cd4)`:"rgba(14,18,48,0.8)",border:`1px solid ${hapticEnabled?"rgba(139,124,246,0.5)":T.gBSoft}`,transition:"all .2s",flexShrink:0,cursor:"pointer",padding:0,boxShadow:hapticEnabled?"0 1px 0 0 rgba(255,255,255,0.18) inset, 0 4px 12px -4px rgba(139,124,246,0.4)":T.insetTop}}>

        {/* Separator */}
        <div style={{height:1,background:T.gBSoft,margin:"16px 0"}}/>
        {/* Push notifications toggle */}
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:14}}>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:4,color:pushSupported?"#f0f2ff":T.dim,letterSpacing:-0.2}}>{langSel==="en"?"Notifications":"Notificações"}</div>
            <div style={{fontSize:12,color:"#7a80a8",lineHeight:1.5}}>
              {!pushSupported?(langSel==="en"?"Install to home screen first (iOS 16.4+)":"Instale na tela inicial primeiro (iOS 16.4+)"):
               pushPermission==="denied"?(langSel==="en"?"Permission denied — enable in iOS Settings":"Permissão negada — ative nos Ajustes do iOS"):
               pushEnabled?(langSel==="en"?"Notifications on — add reminders below":"Notificações ativas — cadastre lembretes abaixo"):
               (langSel==="en"?"Tap to enable":"Toque para ativar")}
            </div>
          </div>
          <button onClick={handlePushToggle} disabled={!pushSupported||pushBusy||pushPermission==="denied"} style={{position:"relative",width:52,height:32,borderRadius:16,background:pushEnabled&&pushSupported?`linear-gradient(180deg,${T.accent},#6d5cd4)`:"rgba(14,18,48,0.8)",border:`1px solid ${pushEnabled&&pushSupported?"rgba(139,124,246,0.5)":T.gBSoft}`,transition:"all .2s",flexShrink:0,cursor:pushSupported&&!pushBusy&&pushPermission!=="denied"?"pointer":"not-allowed",padding:0,opacity:!pushSupported||pushPermission==="denied"?0.4:1,boxShadow:pushEnabled&&pushSupported?"0 1px 0 0 rgba(255,255,255,0.18) inset, 0 4px 12px -4px rgba(139,124,246,0.4)":T.insetTop}}>
            <div style={{position:"absolute",top:3,left:pushEnabled&&pushSupported?25:3,width:24,height:24,borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 2px 6px rgba(0,0,0,0.4)"}}/>
          </button>
        </div>
      </div>

      {/* ── REMINDERS CARD ── medication push reminders */}
      <div style={{background:"linear-gradient(180deg,rgba(22,28,60,0.55),rgba(20,26,60,0.4))",borderRadius:18,border:`1px solid ${T.gBSoft}`,padding:18,marginBottom:14,boxShadow:T.insetTop}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <div style={{width:32,height:32,borderRadius:10,background:`linear-gradient(135deg,${T.accent}38,${T.accent}10)`,border:`1px solid ${T.accent}50`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 1px 0 0 rgba(255,255,255,0.08) inset"}}>

            <div key={r._id} style={{position:"relative",display:"flex",alignItems:"center",gap:12,padding:"14px 14px 14px 18px",borderRadius:14,background:"rgba(14,18,48,0.6)",border:`1px solid ${T.gBSoft}`,boxShadow:T.insetTop,overflow:"hidden"}}>
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:4,background:`linear-gradient(180deg,${T.accent},${T.accent}40)`,borderRadius:"0 2px 2px 0",pointerEvents:"none"}}/>

function ChangelogModal({onClose,lang}){
  // Render a bullet: detect highlight prefix "★ " and bold markers **text**
  const renderBullet=(text,idx)=>{
    const highlighted=text.startsWith("\u2605 ");
    const clean=highlighted?text.slice(2):text;
    // Parse **bold** segments
    const parts=[];
    let remaining=clean;
    let key=0;
    while(remaining.length>0){
      const boldStart=remaining.indexOf("**");
      if(boldStart===-1){parts.push(<span key={key++}>{remaining}</span>);break}
      if(boldStart>0)parts.push(<span key={key++}>{remaining.slice(0,boldStart)}</span>);
      const boldEnd=remaining.indexOf("**",boldStart+2);
      if(boldEnd===-1){parts.push(<span key={key++}>{remaining.slice(boldStart)}</span>);break}
      parts.push(<strong key={key++} style={{color:"#c4b5fd",fontWeight:700}}>{remaining.slice(boldStart+2,boldEnd)}</strong>);
      remaining=remaining.slice(boldEnd+2);
    }
    return(<li key={idx} style={{fontSize:12,color:T.text,lineHeight:1.55,padding:"5px 0 5px 18px",position:"relative",listStyle:"none"}}>
      <span style={{position:"absolute",left:3,top:12,width:6,height:6,borderRadius:"50%",background:highlighted?T.green:T.purple,boxShadow:highlighted?`0 0 8px ${T.green}`:"none"}}/>
      {parts}
    </li>);
  };
  // Format date by language
  const fmtDate=(dateStr)=>{
    if(dateStr.includes("→"))return dateStr;
    const d=new Date(dateStr+"T12:00");
    if(lang==="en")return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
    return d.toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"numeric"}).replace(".","");
  };
  return(<div style={{position:"fixed",inset:0,zIndex:300,background:"rgba(7,11,30,0.75)",backdropFilter:"blur(6px)",WebkitBackdropFilter:"blur(6px)",display:"flex",alignItems:"stretch",justifyContent:"center",padding:"calc(14px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom))"}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.bg1,borderRadius:20,border:"1px solid rgba(139,124,246,0.25)",boxShadow:"0 20px 60px rgba(0,0,0,0.6)",display:"flex",flexDirection:"column",width:"100%",maxWidth:460,maxHeight:"100%",overflow:"hidden"}}>
      {/* Header */}
      <div style={{padding:"16px 18px",borderBottom:"1px solid rgba(139,124,246,0.12)",display:"flex",alignItems:"center",gap:12,background:"linear-gradient(180deg,rgba(139,124,246,0.08),transparent)",flexShrink:0}}>
        <div style={{width:38,height:38,borderRadius:11,background:"linear-gradient(135deg,rgba(139,124,246,0.25),rgba(124,58,237,0.15))",border:"1px solid rgba(139,124,246,0.3)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c4b5fd" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2l3 7h7l-5.5 4 2 7L12 16l-6.5 4 2-7L2 9h7z"/></svg>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:9,fontWeight:800,color:"rgba(139,124,246,0.7)",textTransform:"uppercase",letterSpacing:1}}>{lang==="en"?"What's new · Louise Pro":"Novidades · Louise Pro"}</div>
          <div style={{fontSize:15,fontWeight:800,marginTop:2,color:T.text}}>{lang==="en"?"Version history":"Histórico de versões"}</div>
        </div>
        <button onClick={onClose} style={{width:32,height:32,borderRadius:10,background:"rgba(90,100,180,0.1)",border:`1px solid ${T.gB}`,display:"flex",alignItems:"center",justifyContent:"center",color:T.sub,cursor:"pointer",fontSize:16,flexShrink:0}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      {/* Scroll */}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"16px 18px 20px"}}>
        {CHANGELOG.map((entry,i)=>{
          const data=entry[lang]||entry.pt;
          const isCurrent=entry.v===APP_VERSION;
          return(<div key={entry.v} style={{paddingBottom:18,paddingTop:i>0?18:0,borderTop:i>0?"1px solid rgba(139,124,246,0.08)":"none"}}>

              <span style={{fontSize:15,fontWeight:800,color:T.text,fontVariantNumeric:"tabular-nums"}}>{entry.v==="earlier"?(lang==="en"?"Earlier":"Anteriores"):`v${entry.v}`}</span>

            </div>
            <ul style={{margin:0,padding:0}}>{data.bullets.map((b,j)=>renderBullet(b,j))}</ul>
          </div>);

      </div>
    </div>
  </div>);

function StatsPage({entries,onGrowth}){
  const[period,setPeriod]=useState(7);
  const today=todayStr();
  // Build the day window:
  // - For numeric periods (7/14/30): N complete past days (yesterday → N days ago) + today as bonus
  //   This way "7d" means "average of last 7 complete days, with today shown as context"
  // - For "all": every date that has entries (including today)
  const days=period==="all"
    ?[...new Set(entries.map(e=>e.date))].sort()
    :(()=>{
      const arr=[];
      // Past complete days: from N days ago up to yesterday (inclusive)
      for(let i=period;i>=1;i--){
        const d=new Date();d.setDate(d.getDate()-i);
        arr.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`);
      }
      // Today as bonus visual (still in progress, not part of the average)
      arr.push(today);
      return arr;
    })();
  const numDays=days.length||1;
  const data=days.map(dt=>{
    const de=entries.filter(e=>e.date===dt);
    const sleeps=de.filter(e=>(e.type==="sleep"||e.type==="nap")&&e.durationMin);
    const slReal=sumRealSleep(sleeps);
    const slAwake=sumAwakeInSleep(sleeps);
    const simetCount=de.filter(e=>e.type==="medicine"&&e.name&&/simet/i.test(e.name)).length;
    const tumEntries=de.filter(e=>e.type==="tummytime"&&e.durationMin);
    const tumMin=Math.round(tumEntries.reduce((s,e)=>s+(e.durationMin||0),0));
    return{
      date:dt,isToday:dt===today,
      label:numDays<=14?new Date(dt+"T12:00").toLocaleDateString(_lang==="pt"?"pt-BR":"en-US",{weekday:"short"}).replace(".",""):new Date(dt+"T12:00").toLocaleDateString(_lang==="pt"?"pt-BR":"en-US",{day:"numeric",month:"numeric"}).replace(/\/\d{4}/,""),
      ml:de.filter(e=>e.type==="bottle").reduce((s,e)=>s+(e.ml||0),0),
      sl:slReal,        // real sleep (was: total bedtime including wakings)
      slAwake:slAwake,  // night-waking time
      slBed:slReal+slAwake, // total time in bed
      simet:simetCount,
      tum:tumEntries.length,
      tumMin:tumMin
    }
  });
  // ─────────────────────────────────────────────────
  // AVERAGES: exclude today (still in progress) so the math is honest.
  // Today still appears in the chart, but doesn't pull the average down/up.
  // If today is the only day with data, we fall back to including it
  // (otherwise users would see nothing on first launch).

  const completeData=data.filter(d=>!d.isToday);
  const usingFallback=completeData.length===0;
  const avgData=usingFallback?data:completeData;
  const numComplete=avgData.length||1;
  const mxMl=Math.max(...data.map(d=>d.ml),1);
  const mxSl=Math.max(...data.map(d=>d.sl+d.slAwake),1); // stack height = real + awake
  const avgMl=Math.round(avgData.reduce((s,d)=>s+d.ml,0)/numComplete);
  const avgSl=Math.round(avgData.reduce((s,d)=>s+d.sl,0)/numComplete);
  const avgAwake=Math.round(avgData.reduce((s,d)=>s+d.slAwake,0)/numComplete);
  const avgBed=avgSl+avgAwake;
  // Wakings count per night (only nights with bedtime data, excluding today)
  const avgDays=avgData.map(d=>d.date);
  const totalWakings=avgDays.reduce((s,dt)=>s+countWakings(entries.filter(e=>e.date===dt)),0);
  const nightsWithSleep=avgDays.filter(dt=>entries.some(e=>e.date===dt&&e.type==="sleep"&&e.durationMin)).length;
  const avgWakings=nightsWithSleep>0?Math.round((totalWakings/nightsWithSleep)*10)/10:0;
  // Trend: compare COMPLETE current period to COMPLETE previous period (apples to apples)
  // Previous period = the N days before the current period started
  const prevDays=period!=="all"?Array.from({length:numComplete},(_,i)=>{const d=new Date();d.setDate(d.getDate()-numComplete-1-((numComplete-1)-i));return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}):[];
  const prevMl=prevDays.length?Math.round(prevDays.reduce((s,dt)=>s+entries.filter(e=>e.date===dt&&e.type==="bottle").reduce((ss,e)=>ss+(e.ml||0),0),0)/prevDays.length):0;
  const prevSl=prevDays.length?Math.round(prevDays.reduce((s,dt)=>s+sumRealSleep(entries.filter(e=>e.date===dt)),0)/prevDays.length):0;
  const trendMl=prevMl>0?Math.round(((avgMl-prevMl)/prevMl)*100):0;
  const trendSl=prevSl>0?Math.round(((avgSl-prevSl)/prevSl)*100):0;
  // Extra daily avgs (also exclude today)
  const avgDiapers=Math.round(avgDays.reduce((s,dt)=>s+entries.filter(e=>e.date===dt&&e.type==="diaper").length,0)/numComplete*10)/10;
  const avgFeedings=Math.round(avgDays.reduce((s,dt)=>s+entries.filter(e=>e.date===dt&&(e.type==="bottle"||e.type==="nursing")).length,0)/numComplete*10)/10;
  const avgNaps=Math.round(avgDays.reduce((s,dt)=>s+entries.filter(e=>e.date===dt&&e.type==="nap").length,0)/numComplete*10)/10;
  const avgTum=Math.round(avgData.reduce((s,d)=>s+d.tum,0)/numComplete*10)/10;
  const mxTumMin=Math.max(...data.map(d=>d.tumMin),1);

  // Simeticona stats: doses per day chart + last dose info
  const mxSimet=Math.max(...data.map(d=>d.simet),1);

  const lastSimetEntry=entries.filter(e=>e.type==="medicine"&&e.name&&/simet/i.test(e.name)).sort((a,b)=>`${b.date}T${b.time}`.localeCompare(`${a.date}T${a.time}`))[0];
  const lastSimetAgo=lastSimetEntry?timeSince(lastSimetEntry.date,lastSimetEntry.time):null;
  // Subtitle for averages: tells user what's actually being averaged
  const avgSubtitle=usingFallback
    ?(_lang==="en"?"Today only · still in progress":"Apenas hoje · ainda em curso")
    :(_lang==="en"?`Last ${numComplete} complete day${numComplete>1?"s":""}`:`Últimos ${numComplete} ${numComplete>1?"dias completos":"dia completo"}`);
  const exportCSV=()=>{const h="Data,Hora,Tipo,Detalhe,Notas\n";const rows=entries.map(e=>{let d="";if(e.ml)d=`${e.ml}ml`;else if(e.durationMin)d=fmtDur(e.durationMin);else if(e.name)d=e.name;else if(e.value)d=`${e.value}°C`;else if(e.subtype)d=e.subtype;return`${e.date},${e.time},${TL(e.type)||e.type},${d},${e.notes||""}`}).join("\n");const blob=new Blob([h+rows],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`louise-pro-${todayStr()}.csv`;a.click();URL.revokeObjectURL(url)};

function HistoryPage({entries,onDelete,onEdit}){
  const[dateIdx,setDateIdx]=useState(0);
  const[filter,setFilter]=useState("all");
  const viewDate=dateOffset(todayStr(),-dateIdx);
  const dayE=entries.filter(e=>e.date===viewDate);
  const filtered=filter==="all"?dayE:dayE.filter(e=>{
    if(filter==="feed")return e.type==="bottle"||e.type==="nursing";
    if(filter==="sleep")return e.type==="sleep"||e.type==="nap"||e.type==="wakeup"||e.type==="nightwaking";
    return e.type===filter;
  });
  const dMl=dayE.filter(e=>e.type==="bottle").reduce((s,e)=>s+(e.ml||0),0);
  const dSl=sumRealSleep(dayE);
  // Diaper breakdown: both counts in BOTH wet and dirty (useful "how many had pee / how many had poop")
  const dDiapers=dayE.filter(e=>e.type==="diaper");
  const dWet=dDiapers.filter(e=>e.subtype==="wet"||e.subtype==="both").length;
  const dDirty=dDiapers.filter(e=>e.subtype==="dirty"||e.subtype==="both").length;
  const dLbl=new Date(viewDate+"T12:00").toLocaleDateString(_lang==="pt"?"pt-BR":"en-US",{weekday:"long",day:"numeric",month:"long"});
  const isToday=dateIdx===0;
  // Note: live in-progress bedtime is NOT shown here. It only appears in Home.
  // History is reserved for finalized entries.
  const filters=[{v:"all",l:L("all"),c:T.accent},{v:"feed",l:L("milk"),c:T.green},{v:"sleep",l:L("sleepLabel"),c:T.purple},{v:"diaper",l:typeLabel("diaper",_lang),c:T.pink},{v:"medicine",l:_lang==="en"?"Meds":"Med.",c:T.amber}];
  // Specific type filters (feed/diaper/medicine) → flat chronological list, include
  // events inside bedtimes and tag them with a subtle "night" badge.
  // All/sleep → keep the bedtime grouping via SleepBlock (summary view).
  const isSpecificFilter=filter==="feed"||filter==="diaper"||filter==="medicine";
  const listItems=isSpecificFilter
    ?filtered.map(e=>{
      const bedtime=findContainingBedtime(e,entries);
      return<EntryRow key={e.id} entry={e} onDelete={onDelete} onEdit={onEdit} nightBadge={!!bedtime}/>;
    })
    :filtered.filter(e=>{
      if(e.nightWake)return false;
      if(findContainingBedtime(e,entries))return false;
      return true;
    }).map(e=>(e.type==="sleep"&&e.wakings&&e.wakings.length>0)?<SleepBlock key={e.id} entry={e} onDelete={onDelete} onEdit={onEdit} entries={entries}/>:<EntryRow key={e.id} entry={e} onDelete={onDelete} onEdit={onEdit}/>);
  return(<div style={{padding:"calc(16px + env(safe-area-inset-top)) 20px 0"}}>
    <h2 style={{fontSize:17,fontWeight:700,marginBottom:12}}>{L("history")}</h2>
    {/* Date navigator card */}
    <div style={{background:"linear-gradient(180deg,rgba(22,28,60,0.55),rgba(20,26,60,0.4))",borderRadius:20,border:`1px solid ${T.gBSoft}`,padding:"18px 18px 16px",marginBottom:14,boxShadow:T.insetTop}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setDateIdx(dateIdx+1)} style={{width:38,height:38,borderRadius:12,background:"rgba(22,28,60,0.6)",border:`1px solid ${T.gBSoft}`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:T.insetTop}}><Icon name="back" size={14} color={T.sub}/></button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:17,fontWeight:800,color:isToday?T.accent:T.text,letterSpacing:-0.3}}>{isToday?L("today"):dLbl}</div>
          <div style={{display:"flex",justifyContent:"center",gap:10,fontSize:11,color:T.sub,marginTop:7,flexWrap:"wrap",alignItems:"center"}}>
            {dMl>0&&<span style={{display:"inline-flex",alignItems:"center",gap:4,fontWeight:600,fontVariantNumeric:"tabular-nums"}}><Icon name="bottle" size={11} color={T.green}/>{dMl}ml</span>}
            {dSl>0&&<><span style={{width:3,height:3,borderRadius:"50%",background:T.dim}}/><span style={{display:"inline-flex",alignItems:"center",gap:4,fontWeight:600,fontVariantNumeric:"tabular-nums"}}><Icon name="bed" size={11} color={T.purple}/>{fmtDur(dSl)}</span></>}
            {(dWet>0||dDirty>0)&&<><span style={{width:3,height:3,borderRadius:"50%",background:T.dim}}/><span style={{display:"inline-flex",alignItems:"center",gap:4,color:"#93c5fd",fontWeight:600,fontVariantNumeric:"tabular-nums"}}><Icon name="droplet" size={11} color="#93c5fd"/>{dWet}</span><span style={{display:"inline-flex",alignItems:"center",gap:4,color:"#a16b4a",fontWeight:600,fontVariantNumeric:"tabular-nums"}}><Icon name="poop" size={11} color="#a16b4a"/>{dDirty}</span></>}
            <span style={{width:3,height:3,borderRadius:"50%",background:T.dim}}/>
            <span style={{fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{dayE.length} {L("reg")}</span>
          </div>
        </div>
        <button onClick={()=>setDateIdx(Math.max(0,dateIdx-1))} disabled={isToday} style={{width:38,height:38,borderRadius:12,background:"rgba(22,28,60,0.6)",border:`1px solid ${T.gBSoft}`,display:"flex",alignItems:"center",justifyContent:"center",opacity:isToday?0.3:1,boxShadow:T.insetTop}}><Icon name="forward" size={14} color={T.sub}/></button>
      </div>
    </div>
    {/* Type filters */}
    <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
      {filters.map(f=>{const isActive=filter===f.v;return<button key={f.v} onClick={()=>setFilter(f.v)} style={{padding:"9px 16px",borderRadius:12,fontSize:12,fontWeight:600,whiteSpace:"nowrap",letterSpacing:-0.1,background:isActive?`linear-gradient(180deg,${f.c}38,${f.c}12)`:"rgba(22,28,60,0.5)",color:isActive?f.c:T.sub,border:`1px solid ${isActive?f.c+"55":T.gBSoft}`,boxShadow:isActive?`0 1px 0 0 rgba(255,255,255,0.1) inset, 0 0 0 1px ${f.c}25, 0 6px 16px -8px ${f.c}50`:T.insetTop}}>{f.l}</button>})}
    </div>
    {filtered.length===0&&<p style={{color:T.dim,textAlign:"center",padding:40,fontSize:13}}>{L("noEntries")}{filter!=="all"?(_lang==="en"?" of this type":" desse tipo"):""}</p>}
    {listItems}
  </div>);
}

// ── GROWTH PAGE with WHO percentiles ──
function GrowthPage({entries,birthDate,profile,onBack,onAddEntry}){
  const growthEntries=entries.filter(e=>e.type==="growth").sort((a,b)=>`${a.date}T${a.time}`.localeCompare(`${b.date}T${b.time}`));
  const age=calcAge(birthDate);
  const ageMonths=age?(age.months+(age.days/30)):0;
  const[showForm,setShowForm]=useState(false);
  const[wK,setWK]=useState("");const[lC,setLC]=useState("");const[hC,setHC]=useState("");

  // Build all data points: birth + entries
  const allPoints=[];
  if(profile.birthWeight||profile.birthLength||profile.birthHead){
    allPoints.push({ageM:0,date:birthDate,weightKg:profile.birthWeight,lengthCm:profile.birthLength,headCm:profile.birthHead,label:_lang==="en"?"Birth":"Nasc."});
  }
  growthEntries.forEach(e=>{
    const eAge=calcAge(birthDate);
    if(!eAge)return;
    const d1=new Date(birthDate),d2=new Date(e.date);
    const mths=(d2.getFullYear()-d1.getFullYear())*12+d2.getMonth()-d1.getMonth()+(d2.getDate()-d1.getDate())/30;
    allPoints.push({ageM:Math.max(0,mths),date:e.date,weightKg:e.weightKg,lengthCm:e.lengthCm,headCm:e.headCm,label:new Date(e.date+"T12:00").toLocaleDateString(_lang==="pt"?"pt-BR":"en-US",{day:"numeric",month:"short"})});
  });
  const latest=allPoints[allPoints.length-1];

  const doAdd=()=>{
    if(!wK&&!lC&&!hC)return;
    onAddEntry({type:"growth",date:todayStr(),time:nowTime(),id:uid(),weightKg:wK?parseFloat(wK):undefined,lengthCm:lC?parseFloat(lC):undefined,headCm:hC?parseFloat(hC):undefined});
    setWK("");setLC("");setHC("");setShowForm(false);
  };

  const quickAdd=(field,value)=>{
    const entry={type:"growth",date:todayStr(),time:nowTime(),id:uid()};
    entry[field]=value;
    onAddEntry(entry);
  };

  // Mini chart for a metric
  function GrowthChart({label,field,table,color}){
    const pts=allPoints.filter(p=>p[field]);
    if(pts.length<1)return null;
    // WHO P3, P50, P97 curves
    const maxAge=Math.max(ageMonths+1,3);
    const whoSteps=[];for(let m=0;m<=maxAge;m+=maxAge/20){
      const lms=interpolateLMS(table,m);
      const z3=lms.M*Math.pow(1+lms.L*lms.S*(-1.88),1/lms.L);
      const z97=lms.M*Math.pow(1+lms.L*lms.S*1.88,1/lms.L);
      whoSteps.push({m,p3:Math.abs(lms.L)>0.001?z3:lms.M*Math.exp(-1.88*lms.S),p50:lms.M,p97:Math.abs(lms.L)>0.001?z97:lms.M*Math.exp(1.88*lms.S)});
    }
    const allVals=[...whoSteps.map(w=>w.p97),...whoSteps.map(w=>w.p3),...pts.map(p=>p[field])];
    const minV=Math.min(...allVals)*0.9,maxV=Math.max(...allVals)*1.05;
    const W=320,H=140;
    const x=m=>10+(m/maxAge)*(W-20);
    const y=v=>H-10-((v-minV)/(maxV-minV))*(H-20);
    const pathStr=(arr,key)=>arr.map((p,i)=>`${i===0?"M":"L"}${x(p.m).toFixed(1)},${y(p[key]).toFixed(1)}`).join(" ");
    return(<div style={{marginBottom:16}}>
      <div style={{fontSize:12,fontWeight:700,color,marginBottom:6}}>{label}</div>
      <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",background:T.glass,borderRadius:12,border:`1px solid ${T.gB}`}}>
        <path d={pathStr(whoSteps,"p3")+" L"+x(maxAge)+","+y(whoSteps[whoSteps.length-1].p97)+" "+pathStr([...whoSteps].reverse(),"p97")} fill={`${color}08`} stroke="none"/>
        <path d={pathStr(whoSteps,"p50")} fill="none" stroke={`${color}44`} strokeWidth="1" strokeDasharray="4,3"/>
        <path d={pathStr(whoSteps,"p3")} fill="none" stroke={`${color}22`} strokeWidth="0.5"/>
        <path d={pathStr(whoSteps,"p97")} fill="none" stroke={`${color}22`} strokeWidth="0.5"/>
        {pts.map((p,i)=><circle key={i} cx={x(p.ageM)} cy={y(p[field])} r={4} fill={color} stroke={T.bg1} strokeWidth={2}/>)}
        {pts.length>1&&<path d={pts.map((p,i)=>`${i===0?"M":"L"}${x(p.ageM).toFixed(1)},${y(p[field]).toFixed(1)}`).join(" ")} fill="none" stroke={color} strokeWidth="2"/>}
        <text x={W-4} y={y(whoSteps[whoSteps.length-1].p50)+4} textAnchor="end" fill={`${color}66`} fontSize="8">P50</text>
        <text x={W-4} y={y(whoSteps[whoSteps.length-1].p97)+4} textAnchor="end" fill={`${color}44`} fontSize="7">P97</text>
        <text x={W-4} y={y(whoSteps[whoSteps.length-1].p3)+4} textAnchor="end" fill={`${color}44`} fontSize="7">P3</text>
      </svg>
    </div>);
  }

  function PercentileCard({label,value,unit,table,icon,field,onQuickAdd}){
    const[adding,setAdding]=useState(false);
    const[val,setVal]=useState("");
    if(!value&&!adding)return(<div style={{background:T.glass,borderRadius:14,padding:14,marginBottom:8,border:`1px solid ${T.gB}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}><Icon name={icon} size={14} color={T.dim}/><span style={{fontSize:13,fontWeight:600,color:T.dim}}>{label}</span></div>
      <button onClick={()=>setAdding(true)} style={{padding:"6px 12px",borderRadius:8,background:"rgba(163,230,53,0.1)",border:"1px solid rgba(163,230,53,0.2)",fontSize:11,fontWeight:700,color:"#a3e635"}}>+ Registrar</button>
    </div>);
    const result=value?getPercentile(value,table,ageMonths):null;
    const p=result?.percentile;
    const pColor=!p?T.dim:p<3||p>97?T.red:p<15||p>85?T.orange:T.green;
    return(<div style={{background:T.glass,borderRadius:14,padding:14,marginBottom:8,border:`1px solid ${T.gB}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><Icon name={icon} size={14} color={pColor}/><span style={{fontSize:13,fontWeight:700}}>{label}</span></div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {value&&<span style={{fontSize:18,fontWeight:800}}>{value} {unit}</span>}
          <button onClick={()=>setAdding(!adding)} style={{width:28,height:28,borderRadius:8,background:"rgba(163,230,53,0.1)",border:"1px solid rgba(163,230,53,0.15)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="plus" size={12} color="#a3e635"/></button>
        </div>
      </div>
      {value&&<><div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1,height:6,borderRadius:3,background:T.bg3,overflow:"hidden",position:"relative"}}>
          <div style={{position:"absolute",left:"3%",width:1,height:"100%",background:T.dim,opacity:0.3}}/>
          <div style={{position:"absolute",left:"50%",width:1,height:"100%",background:T.dim,opacity:0.5}}/>
          <div style={{position:"absolute",left:"97%",width:1,height:"100%",background:T.dim,opacity:0.3}}/>
          <div style={{position:"absolute",left:`${Math.max(1,Math.min(99,p))}%`,transform:"translateX(-50%)",width:8,height:8,borderRadius:"50%",background:pColor,top:-1,boxShadow:`0 0 6px ${pColor}88`}}/>
        </div>
        <span style={{fontSize:14,fontWeight:800,color:pColor,minWidth:35,textAlign:"right"}}>P{p}</span>
      </div>
      <div style={{fontSize:10,color:T.sub,marginTop:4}}>{_lang==="en"?"WHO Median":"Mediana OMS"}: {result.median.toFixed(1)} {unit}</div></>}
      {adding&&<div style={{display:"flex",gap:8,marginTop:10,alignItems:"center"}}>
        <input type="number" inputMode="decimal" step="0.01" placeholder={`${label} em ${unit}`} value={val} onChange={e=>setVal(e.target.value)} autoFocus style={{flex:1,padding:"10px 12px",background:"rgba(14,18,48,0.8)",border:`1px solid ${T.gB}`,borderRadius:10,color:T.text,fontSize:15,outline:"none",textAlign:"center"}}/>
        <button onClick={()=>{if(!val)return;onQuickAdd(field,parseFloat(val));setVal("");setAdding(false)}} style={{padding:"10px 16px",borderRadius:10,background:"#a3e635",color:T.bg1,fontSize:13,fontWeight:700}}>{L("save")}</button>
      </div>}
    </div>);
  }

  const inp={width:"100%",maxWidth:"100%",boxSizing:"border-box",WebkitAppearance:"none",appearance:"none",padding:"15px 12px",background:"rgba(20,26,60,0.55)",border:`1px solid ${T.gBSoft}`,borderRadius:14,color:T.text,fontSize:17,fontWeight:600,letterSpacing:-0.2,outline:"none",textAlign:"center",boxShadow:T.insetTop};

  return(<div style={{padding:"calc(16px + env(safe-area-inset-top)) 20px 0"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><button onClick={onBack} style={{width:32,height:32,borderRadius:10,background:T.glass,border:`1px solid ${T.gB}`,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="back" size={16} color={T.sub}/></button><h2 style={{fontSize:17,fontWeight:700,margin:0}}>{L("growth")}</h2></div>
      <button onClick={()=>setShowForm(!showForm)} style={{padding:"6px 12px",borderRadius:10,background:"rgba(163,230,53,0.1)",border:"1px solid rgba(163,230,53,0.2)",fontSize:12,fontWeight:700,color:"#a3e635"}}>{showForm?L("cancel"):(_lang==="en"?"+ Measure":"+ Medição")}</button>
    </div>

    {showForm&&<div style={{background:T.glass,borderRadius:14,padding:16,marginBottom:16,border:`1px solid ${T.gB}`}}>
      <div style={{fontSize:12,fontWeight:700,color:T.sub,marginBottom:12}}>{_lang==="en"?"New measurement":"Nova medição"}</div>
      <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) minmax(0,1fr) minmax(0,1fr)",gap:8,marginBottom:12}}>
        <Fld label={`${L("weight")} (kg)`}><input type="number" inputMode="decimal" step="0.01" placeholder="4.5" value={wK} onChange={e=>setWK(e.target.value)} style={inp}/></Fld>
        <Fld label={`${_lang==="en"?"Length":"Comp."} (cm)`}><input type="number" inputMode="decimal" step="0.1" placeholder="55" value={lC} onChange={e=>setLC(e.target.value)} style={inp}/></Fld>
        <Fld label={`${L("head")} (cm)`}><input type="number" inputMode="decimal" step="0.1" placeholder="37" value={hC} onChange={e=>setHC(e.target.value)} style={inp}/></Fld>
      </div>
      <button onClick={doAdd} style={{width:"100%",padding:12,borderRadius:10,background:"#a3e635",color:T.bg1,fontSize:14,fontWeight:700}}>{_lang==="en"?"Save measurement":"Salvar medição"}</button>
    </div>}

    {/* Percentile cards */}
    {latest&&<div style={{fontSize:11,color:T.sub,marginBottom:10}}>
      {latest.label===(_lang==="en"?"Birth":"Nasc.")?(_lang==="en"?"Birth data":L("birthData")):`${_lang==="en"?"Last":"Últ."}: ${latest.label}`} · {ageMonths.toFixed(1)} {_lang==="en"?"mo":"meses"}
    </div>}
    <PercentileCard label={L("weight")} value={latest?.weightKg} unit="kg" table={WHO_GIRLS.weight} icon="target" field="weightKg" onQuickAdd={quickAdd}/>
    <PercentileCard label={L("length")} value={latest?.lengthCm} unit="cm" table={WHO_GIRLS.length} icon="ruler" field="lengthCm" onQuickAdd={quickAdd}/>
    <PercentileCard label={L("head")} value={latest?.headCm} unit="cm" table={WHO_GIRLS.head} icon="target" field="headCm" onQuickAdd={quickAdd}/>

    {/* Growth charts */}
    {allPoints.length>0&&<>
      <div style={{fontSize:12,fontWeight:600,color:T.dim,marginTop:16,marginBottom:10,textTransform:"uppercase",letterSpacing:0.8}}>{_lang==="en"?"Growth curves":"Curvas de crescimento"}</div>
      <GrowthChart label={`${L("weight")} (kg)`} field="weightKg" table={WHO_GIRLS.weight} color={T.green}/>
      <GrowthChart label={`${L("length")} (cm)`} field="lengthCm" table={WHO_GIRLS.length} color={T.blue}/>
      <GrowthChart label={`${L("head")} (cm)`} field="headCm" table={WHO_GIRLS.head} color={T.amber}/>
    </>}

    {/* History table */}
    {allPoints.length>0&&<><div style={{fontSize:12,fontWeight:600,color:T.dim,marginTop:8,marginBottom:10,textTransform:"uppercase",letterSpacing:0.8}}>Histórico</div>
      {[...allPoints].reverse().map((p,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 12px",marginBottom:4,background:T.glass,borderRadius:10,border:`1px solid ${T.gB}`}}>
        <span style={{fontSize:11,color:T.sub,minWidth:50}}>{p.label}</span>
        <div style={{flex:1,display:"flex",gap:10,fontSize:12}}>
          {p.weightKg&&<span style={{color:T.green}}>{p.weightKg}kg</span>}
          {p.lengthCm&&<span style={{color:T.blue}}>{p.lengthCm}cm</span>}
          {p.headCm&&<span style={{color:T.amber}}>Cab. {p.headCm}</span>}
        </div>
      </div>)}
    </>}
    <div style={{marginTop:16,padding:12,background:T.glass,borderRadius:12,border:`1px solid ${T.gB}`,fontSize:10,color:T.dim,lineHeight:1.6}}>
      Curvas OMS para meninas 0-24m. Linha tracejada = P50 (mediana). Faixa = P3-P97.
    </div>
  </div>);
}

// ── MAIN APP ──
function App(){
  const[entries,setEntries]=useState([]);const[savedMeds,setSavedMeds]=useState([]);
  const[profile,setProfile]=useState({name:"",birthDate:"2026-03-08",photo:"",mlGoal:0});
  const[activeTimer,setActiveTimer]=useState(null);const[loading,setLoading]=useState(true);
  const[page,setPage]=useState("home");const[showAdd,setShowAdd]=useState(false);const[formType,setFormType]=useState(null);const[editEntry,setEditEntry]=useState(null);const[showOrbit,setShowOrbit]=useState(false);
  const[showProfile,setShowProfile]=useState(false);const[showSleepInfo,setShowSleepInfo]=useState(false);
  const[inbox,setInbox]=useState({items:[],lastReset:""});const[showInbox,setShowInbox]=useState(false);
  const[reminders,setReminders]=useState([]);
  const[showChangelog,setShowChangelog]=useState(false);const[showUpdateToast,setShowUpdateToast]=useState(false);
  const[showEditStart,setShowEditStart]=useState(false);
  const[showNursingPicker,setShowNursingPicker]=useState(false);
  const lang=profile.lang||"en";_lang=lang;
  const[toast,setToast]=useState(null);const[tick,setTick]=useState(0);const undoRef=useRef(null);
  const[splash,setSplash]=useState(true);
  useEffect(()=>{const t=setTimeout(()=>setSplash(false),1800);return()=>clearTimeout(t)},[]);

  // Changelog unread detection + one-time toast after update
  const hasUnreadChangelog=profile.lastSeenVersion!==APP_VERSION;
  const profileLoadedRef=useRef(false);
  useEffect(()=>{
    // Wait for profile to be loaded from Firestore first (has at least a lang or explicit marker)
    if(loading||profileLoadedRef.current)return;
    profileLoadedRef.current=true;
    // Only show toast if there's a previous version recorded and it differs from current
    // (first-ever install: lastSeenVersion undefined → skip toast, just mark as seen silently)
    if(profile.lastSeenVersion&&profile.lastSeenVersion!==APP_VERSION){
      setShowUpdateToast(true);
    }else if(!profile.lastSeenVersion){
      // First time: mark silently without showing toast
      FB.saveProfile({...profile,lastSeenVersion:APP_VERSION}).catch(()=>{});
    }
  },[loading,profile.lastSeenVersion]);
  const markChangelogSeen=()=>{
    if(profile.lastSeenVersion!==APP_VERSION){
      FB.saveProfile({...profile,lastSeenVersion:APP_VERSION}).catch(()=>{});
    }
  };
  const openChangelog=()=>{setShowChangelog(true);setShowUpdateToast(false);markChangelogSeen()};
  const dismissUpdateToast=()=>{setShowUpdateToast(false);markChangelogSeen()};
  const closeChangelog=()=>{setShowChangelog(false);markChangelogSeen()};

  useEffect(()=>{const iv=activeTimer?1000:30000;const t=setInterval(()=>setTick(k=>k+1),iv);return()=>clearInterval(t)},[activeTimer]);

  // Wake Lock: keep screen on during night wake or nursing
  const wakeLockEnabled=profile.keepScreenOn!==false;
  const shouldLock=wakeLockEnabled&&activeTimer&&(activeTimer.type==="nursing"||activeTimer.type==="tummytime"||(activeTimer.type==="sleep"&&activeTimer.nightWake));
  useEffect(()=>{
    if(shouldLock){WakeLock.request()}else{WakeLock.release()}
    const onVis=()=>{if(document.visibilityState==="visible"&&shouldLock)WakeLock.request()};
    document.addEventListener("visibilitychange",onVis);
    return()=>{document.removeEventListener("visibilitychange",onVis)};
  },[shouldLock]);
  useEffect(()=>()=>{WakeLock.release()},[]);

  // Haptic feedback: sync enabled state from profile
  useEffect(()=>{
    Haptic.setEnabled(profile.hapticEnabled!==false);
  },[profile.hapticEnabled]);

  // Push Notifications: register Service Worker on mount (if supported)
  // Does NOT request permission — that requires user gesture from Profile toggle
  useEffect(()=>{
    if(PushNotifs.isSupported()){
      PushNotifs.registerServiceWorker().catch(()=>{/* fail silent */});
    }
    // Configure VAPID key for FCM token retrieval (Firebase Cloud Messaging)
    PushNotifs.setVapidKey("BE7jb8k2HRvR-q-xUj_1boSI8vG8-ZwFwIyaDh4Pq7ClegyqG_JjuYJ3JHd2lGAzUXr3kZtz1DRIUVO215uoRhs");
    // Inject Firestore token saver so device-features.js stays decoupled
    PushNotifs.setTokenSaver(async(token)=>{
      try{await FB.savePushToken(token,profile.lang||"en")}catch(e){}
    });
