    <Modal open={showSleepInfo} onClose={()=>setShowSleepInfo(false)}>
      {sleepRec?.phase===1&&<><div style={{textAlign:"center",marginBottom:16}}><Icon name="star" size={40} color={T.accent} fill={T.accent}/></div><div style={{textAlign:"center",fontSize:22,fontWeight:800,marginBottom:6}}>{sleepRec.dl} {_lang==="en"?"days":"dias"}</div><div style={{textAlign:"center",fontSize:13,color:T.sub,marginBottom:16}}>{_lang==="en"?`until ${babyName}'s sleep plan`:`para o plano de sono de ${babyName}`}</div><div style={{height:4,borderRadius:2,background:T.bg1,marginBottom:16,overflow:"hidden",filter:`drop-shadow(0 0 5px ${T.accent}44)`}}><div style={{height:"100%",width:`${Math.max(0,Math.min(100,((60-sleepRec.dl)/60)*100))}%`,background:T.accent,borderRadius:2}}/></div><div style={{fontSize:12,color:T.sub,lineHeight:1.6}}>{_lang==="en"?"At 2 months the circadian rhythm matures. Keep tracking.":"Aos 2 meses o ritmo circadiano amadurece. Continue registrando."}</div><div style={{marginTop:14,padding:"10px 12px",borderRadius:10,background:"rgba(14,18,48,0.6)",fontSize:11,color:T.dim}}>{_lang==="en"?"Window":"Janela"}: {sleepRec.g.min}–{sleepRec.g.max} min · {sleepRec.g.naps} {_lang==="en"?"naps/day":"sonecas/dia"}</div>
        {age&&age.totalDays>=1&&age.totalDays<=30&&CURIOSITIES[age.totalDays-1]&&<><div style={{height:1,background:`${T.accent}18`,margin:"16px 0"}}/><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><Icon name="sun" size={16} color={T.amber}/><span style={{fontSize:9,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:T.amber}}>{_lang==="en"?`Day ${age.totalDays}`:`Dia ${age.totalDays}`}</span></div><div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{(_lang==="en"?CURIOSITIES[age.totalDays-1].en:CURIOSITIES[age.totalDays-1].pt).t}</div><div style={{fontSize:11,color:T.sub,lineHeight:1.5}}>{(_lang==="en"?CURIOSITIES[age.totalDays-1].en:CURIOSITIES[age.totalDays-1].pt).b}</div></>}
      </>}
      {sleepRec?.phase===2&&<><div style={{textAlign:"center",marginBottom:12}}><Icon name="check" size={36} color={T.green}/></div><div style={{textAlign:"center",fontSize:16,fontWeight:700,marginBottom:14}}>{_lang==="en"?"Sleep plan active":"Plano de sono ativo"}</div>{sleepRec.a?<><div style={{padding:10,borderRadius:10,background:T.greenS,textAlign:"center",marginBottom:14}}><div style={{fontSize:9,color:T.sub,textTransform:"uppercase",marginBottom:4}}>{_lang==="en"?"Recommended WW":"Janela recomendada"}</div><div style={{fontSize:18,fontWeight:800,color:T.green}}>{fmtDur(sleepRec.a.rec)}</div></div><div style={{fontSize:11,color:T.dim,marginBottom:14}}>{_lang==="en"?`Based on ${sleepRec.a.pts} observations`:`Baseado em ${sleepRec.a.pts} observações`}</div></>:<div style={{fontSize:12,color:T.sub,marginBottom:14}}>{_lang==="en"?"Track more data to personalize.":"Registre mais dados para personalizar."}</div>}
        {sleepPattern&&sleepRec?.phase===2&&(fullSchedule.length>0||daySchedule.length>0)&&<>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><Icon name="clock" size={16} color={T.accent}/><span style={{fontSize:13,fontWeight:700,color:T.accent}}>{_lang==="en"?"Today's routine":"Rotina do dia"}</span><span style={{fontSize:9,color:T.dim,marginLeft:"auto"}}>{_lang==="en"?`${sleepPattern.days} days`:`${sleepPattern.days} dias`}</span></div>
          {(fullSchedule.length>0?fullSchedule:daySchedule.map(s=>({...s,type:s.bed?"sleep":"nap",timeMin:s.startMin}))).map((s,i)=>{
            const isNap=s.type==="nap";const isBed=s.type==="sleep"||s.bed;const isFeed=s.type==="feed";const isBath=s.type==="bath";
            const icon=isFeed?"bottle":isBath?"bath":isBed?"moon":"cloud";
            const color=isFeed?T.blue:isBath?"#38bdf8":T.accent;
            const label=isBed?(_lang==="en"?"Bedtime":"Sono"):isFeed?(_lang==="en"?"Feed":"Mamada"):isBath?(_lang==="en"?"Bath":"Banho"):(_lang==="en"?`${["","1st","2nd","3rd","4th","5th","6th"][s.pos]||s.pos+"th"} nap`:`${s.pos}a soneca`);
            const timeStr=s.timeMin?minToTime(s.timeMin):(s.startMin?minToTime(s.startMin):"--:--");
            const statusColor=s.status==="done"?T.green:s.status==="next"?T.accent:T.dim;
            return <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderTop:i>0?`1px solid ${T.gB}`:"none",opacity:s.status==="later"?0.45:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6,minWidth:52}}>
                <Icon name={icon} size={12} color={s.status==="done"?T.dim:color}/>
                <span style={{fontSize:14,fontWeight:800,color:s.status==="done"?T.text:s.status==="next"?color:T.dim}}>{s.status!=="done"?"~":""}{timeStr}</span>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:600,color:s.status==="done"?T.text:s.status==="next"?T.text:T.dim}}>{label}</div>
                {isNap&&!isBed&&<div style={{fontSize:9,color:T.dim}}>WW {fmtDur(s.ww)}{s.durRange?" · "+s.durRange:s.duration>0?" · "+fmtDur(s.duration||s.durMin):""}</div>}
              </div>
              <span style={{fontSize:9,fontWeight:600,padding:"2px 7px",borderRadius:5,background:s.status==="done"?T.greenS:s.status==="next"?`${color}20`:`${T.dim}12`,color:statusColor}}>{s.status==="done"?(_lang==="en"?"Done":"Feito"):s.status==="next"?(_lang==="en"?"Next":"Prox."):(_lang==="en"?"Later":"Depois")}</span>
            </div>
          })}
        </>}
      </>}
    </Modal>

    <Sheet open={showAdd&&!formType} onClose={()=>setShowAdd(false)}>
      <div style={{display:"grid",gridTemplateColumns:"minmax(0,1fr) minmax(0,1fr) minmax(0,1fr)",gap:"10px 0",padding:"0 16px"}}>{["wakeup","bottle","nursing","sleep","nap","diaper","bath","medicine","temperature","tummytime"].map((type,i)=>{const cfg=TYPES[type];const last=entries.find(e=>e.type===type);const agoRaw=last?timeSince(last.date,last.time):null;const ago=agoRaw==="now"?"Just now":agoRaw;return(<button key={type} onClick={()=>setFormType(type)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10,padding:"12px 4px 8px",animation:`slideUp .3s ease ${i*0.035}s both`}}>
        <div style={{width:70,height:70,borderRadius:"50%",background:`radial-gradient(circle at 35% 30%, rgba(50,60,120,0.95), rgba(18,22,55,0.98))`,border:`1.5px solid ${cfg.color}25`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 20px rgba(0,0,0,0.4), 0 0 24px ${cfg.color}18, 0 0 48px ${cfg.color}08, inset 0 1px 0 rgba(200,210,255,0.08), inset 0 -2px 4px rgba(0,0,0,0.2)`,position:"relative",overflow:"hidden",filter:`drop-shadow(0 0 5px ${cfg.color}44)`}}>
          {/* Inner glow spot */}
          <div style={{position:"absolute",top:"15%",left:"25%",width:"40%",height:"30%",background:`radial-gradient(ellipse,${cfg.color}12,transparent)`,borderRadius:"50%",filter:"blur(6px)"}}/>
          <Icon name={cfg.icon} size={27} color={cfg.color}/>
        </div>
        <div style={{textAlign:"center"}}><div style={{fontSize:12,fontWeight:600,color:T.text,lineHeight:1.3}}>{cfg.label[_lang]||cfg.label.en}</div>{ago&&<div style={{fontSize:12,color:T.sub,fontWeight:500,marginTop:2}}>{ago}</div>}</div>
      </button>)})}</div>
    </Sheet>

    <Sheet open={!!formType} onClose={()=>{setFormType(null);setEditEntry(null)}}>
      {formType&&<AddForm type={formType} onSave={addEntry} savedMeds={savedMeds} onSaveMeds={async m=>await FB.saveMeds(m)} editEntry={editEntry} lastBottleMl={lastBottleMl} topMl={topMl} onStartTimer={type=>{startTimer(type);setFormType(null);setShowAdd(false)}}/>}
    </Sheet>

    {showProfile&&<ProfilePage profile={profile} onSave={async p=>await FB.saveProfile(p)} onBack={()=>setShowProfile(false)} onGrowth={()=>{setShowProfile(false);goTo("growth")}} onShowChangelog={()=>setShowChangelog(true)} hasUnreadChangelog={hasUnreadChangelog} reminders={reminders} onAddReminder={async r=>await FB.addReminder(r)} onDelReminder={async id=>await FB.delReminder(id)}/>}
    {showInbox&&<InboxPanel inbox={inbox} onClose={()=>setShowInbox(false)} onMarkRead={markInboxRead} onMarkAllRead={markAllInboxRead} lang={lang}/>}
    {showChangelog&&<ChangelogModal onClose={closeChangelog} lang={lang}/>}
    {showUpdateToast&&!showChangelog&&<UpdateToast fromVersion={profile.lastSeenVersion} toVersion={APP_VERSION} onView={openChangelog} onDismiss={dismissUpdateToast} lang={lang}/>}
    <TimerBar activeTimer={activeTimer} onStop={stopTimer} onSwitch={switchSide} onPause={pauseNursing} onEditStart={()=>setShowEditStart(true)}/>
    <EditStartModal open={showEditStart} onClose={()=>setShowEditStart(false)} activeTimer={activeTimer} onSave={handleEditStart}/>
    <NursingSidePicker open={showNursingPicker} onClose={()=>setShowNursingPicker(false)} onSelect={side=>startTimer("nursing",side)}/>

    <nav style={{position:"fixed",bottom:"6px",left:"50%",transform:"translateX(-50%)",display:"flex",alignItems:"center",gap:4,padding:"9px 14px",background:"linear-gradient(180deg,rgba(14,18,48,0.94),rgba(8,10,28,0.96))",backdropFilter:"blur(30px)",WebkitBackdropFilter:"blur(30px)",borderRadius:44,border:"1px solid rgba(255,255,255,0.06)",boxShadow:"0 1px 0 0 rgba(255,255,255,0.08) inset, 0 0 0 1px rgba(255,255,255,0.02), 0 8px 32px -4px rgba(0,0,0,0.7), 0 0 60px -20px rgba(139,124,246,0.25)",zIndex:50}}>
      {[{icon:"home",label:"HOME",active:page==="home"&&!showAdd,action:()=>goTo("home")},{icon:"clock",label:_lang==="en"?"HISTORY":"HIST.",active:page==="history",action:()=>goTo("history")}].map(n=><button key={n.icon} onClick={n.action} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"9px 16px",borderRadius:18,background:n.active?"linear-gradient(180deg,rgba(139,124,246,0.22),rgba(139,124,246,0.08))":"transparent",border:n.active?"1px solid rgba(139,124,246,0.28)":"1px solid transparent",boxShadow:n.active?"0 1px 0 0 rgba(255,255,255,0.1) inset, 0 0 0 1px rgba(139,124,246,0.1), 0 4px 12px -4px rgba(139,124,246,0.4)":"none",transition:"all .2s"}}><Icon name={n.icon} size={20} color={n.active?"#c4b5fd":T.dim}/>{n.active&&<span style={{fontSize:9,fontWeight:700,color:"#c4b5fd",letterSpacing:0.3}}>{n.label}</span>}</button>)}
      <button onClick={()=>{setShowAdd(!showAdd);setFormType(null);setPage("home")}} style={{width:54,height:54,borderRadius:"50%",background:`linear-gradient(180deg,#9b8df8,#7c3aed)`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 1px 0 0 rgba(255,255,255,0.25) inset, 0 0 0 1px rgba(255,255,255,0.08), 0 8px 24px -4px ${T.accent}80, 0 0 0 4px rgba(139,124,246,0.08)`,transition:"transform .2s cubic-bezier(0.34,1.56,0.64,1)",transform:showAdd?"rotate(45deg) scale(1.05)":"scale(1)",margin:"-6px 4px"}}><Icon name="plus" size={26} color="#fff"/></button>
      {[{icon:"chart",label:"STATS",active:page==="stats"||page==="growth",action:()=>goTo("stats")},{icon:"gear",label:_lang==="en"?"SETTINGS":"CONFIG",active:false,action:()=>setShowProfile(true)}].map(n=><button key={n.icon} onClick={n.action} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"9px 16px",borderRadius:18,background:n.active?"linear-gradient(180deg,rgba(139,124,246,0.22),rgba(139,124,246,0.08))":"transparent",border:n.active?"1px solid rgba(139,124,246,0.28)":"1px solid transparent",boxShadow:n.active?"0 1px 0 0 rgba(255,255,255,0.1) inset, 0 0 0 1px rgba(139,124,246,0.1), 0 4px 12px -4px rgba(139,124,246,0.4)":"none",transition:"all .2s"}}><Icon name={n.icon} size={20} color={n.active?"#c4b5fd":T.dim}/>{n.active&&<span style={{fontSize:9,fontWeight:700,color:"#c4b5fd",letterSpacing:0.3}}>{n.label}</span>}</button>)}
    </nav>
  </div>);
}

// Remove loading screen
var _ld=document.getElementById('load-debug');if(_ld)_ld.remove();
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
